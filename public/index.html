<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmos3-Nano Reasoner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f12; color: #e2e2e2; min-height: 100vh; }

    .app { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    header { margin-bottom: 32px; }
    header h1 { font-size: 22px; font-weight: 600; color: #76b900; letter-spacing: -0.3px; }
    header p { font-size: 13px; color: #888; margin-top: 4px; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #555; }
    .status-dot.ok { background: #76b900; }
    .status-dot.err { background: #e55; }

    .card { background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 16px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 7px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #2a2a32; background: transparent; color: #888; transition: all 0.15s; }
    .tab.active { background: #76b900; border-color: #76b900; color: #0f0f12; font-weight: 600; }

    .drop-zone {
      border: 2px dashed #2a2a32; border-radius: 8px; padding: 36px;
      text-align: center; cursor: pointer; transition: all 0.15s; color: #666;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: #76b900; color: #76b900; }
    .drop-zone input { display: none; }

    .preview { margin-top: 12px; max-height: 260px; border-radius: 8px; overflow: hidden; }
    .preview img { width: 100%; max-height: 260px; object-fit: contain; background: #111; }

    input[type="text"], textarea {
      width: 100%; background: #111; border: 1px solid #2a2a32; border-radius: 8px;
      color: #e2e2e2; padding: 10px 14px; font-size: 14px; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { border-color: #76b900; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .url-row { display: flex; gap: 8px; }

    button.submit {
      width: 100%; padding: 12px; background: #76b900; color: #0f0f12;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
    }
    button.submit:hover { opacity: 0.88; }
    button.submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .result-box {
      background: #111; border: 1px solid #2a2a32; border-radius: 8px;
      padding: 16px; white-space: pre-wrap; font-size: 14px; line-height: 1.7;
      color: #ddd; min-height: 80px; max-height: 500px; overflow-y: auto;
    }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #333; border-top-color: #76b900;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #f55; font-size: 13px; margin-top: 8px; }
    label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
    .field { margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    function App() {
      const [vllmStatus, setVllmStatus] = useState(null);
      const [tab, setTab] = useState('upload');        // 'upload' | 'url'
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [imageUrl, setImageUrl] = useState('');
      const [prompt, setPrompt] = useState('Describe what you see in this image in detail.');
      const [result, setResult] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [drag, setDrag] = useState(false);
      const fileRef = useRef();

      useEffect(() => {
        fetch('/api/health')
          .then(r => r.json())
          .then(d => setVllmStatus(d.vllm))
          .catch(() => setVllmStatus('unreachable'));
      }, []);

      const handleFile = (f) => {
        if (!f) return;
        setFile(f);
        const url = URL.createObjectURL(f);
        setPreview(url);
        setError('');
      };

      const onDrop = useCallback((e) => {
        e.preventDefault(); setDrag(false);
        const f = e.dataTransfer.files[0];
        if (f && f.type.startsWith('image/')) handleFile(f);
      }, []);

      const submit = async () => {
        setError(''); setResult(''); setLoading(true);
        try {
          const form = new FormData();
          form.append('prompt', prompt);
          if (tab === 'upload' && file) {
            form.append('image', file);
          } else if (tab === 'url' && imageUrl) {
            form.append('image_url', imageUrl);
          } else {
            setError('Please provide an image.'); setLoading(false); return;
          }
          const r = await fetch('/api/analyze', { method: 'POST', body: form });
          const data = await r.json();
          if (!r.ok) { setError(data.error || 'Request failed'); }
          else { setResult(data.result); }
        } catch (e) {
          setError(e.message);
        } finally { setLoading(false); }
      };

      const canSubmit = !loading && prompt.trim() &&
        (tab === 'upload' ? !!file : !!imageUrl.trim());

      return (
        <div className="app">
          <header>
            <h1>⚡ Cosmos3-Nano Reasoner</h1>
            <p>
              <span className={`status-dot ${vllmStatus === 'ok' ? 'ok' : vllmStatus ? 'err' : ''}`} />
              vLLM: {vllmStatus || 'checking…'}
            </p>
          </header>

          <div className="card">
            <h2>Image</h2>
            <div className="tabs">
              <button className={`tab ${tab === 'upload' ? 'active' : ''}`} onClick={() => setTab('upload')}>Upload File</button>
              <button className={`tab ${tab === 'url' ? 'active' : ''}`} onClick={() => setTab('url')}>Image URL</button>
            </div>

            {tab === 'upload' && (
              <>
                <div
                  className={`drop-zone ${drag ? 'drag' : ''}`}
                  onClick={() => fileRef.current.click()}
                  onDragOver={e => { e.preventDefault(); setDrag(true); }}
                  onDragLeave={() => setDrag(false)}
                  onDrop={onDrop}
                >
                  <input ref={fileRef} type="file" accept="image/*"
                    onChange={e => handleFile(e.target.files[0])} />
                  {file ? <span>📎 {file.name}</span> : <span>Click or drag &amp; drop an image here</span>}
                </div>
                {preview && (
                  <div className="preview">
                    <img src={preview} alt="preview" />
                  </div>
                )}
              </>
            )}

            {tab === 'url' && (
              <div className="field">
                <label>Image URL</label>
                <input type="text" placeholder="https://example.com/image.jpg"
                  value={imageUrl} onChange={e => setImageUrl(e.target.value)} />
              </div>
            )}
          </div>

          <div className="card">
            <h2>Prompt</h2>
            <div className="field">
              <textarea
                value={prompt}
                onChange={e => setPrompt(e.target.value)}
                placeholder="What do you want to know about this image?"
                rows={3}
              />
            </div>
            {error && <div className="error">⚠ {error}</div>}
            <button className="submit" onClick={submit} disabled={!canSubmit}>
              {loading ? <><span className="spinner" />Analyzing…</> : 'Analyze Image'}
            </button>
          </div>

          {(result || loading) && (
            <div className="card">
              <h2>Result</h2>
              <div className="result-box">
                {loading && !result ? 'Running inference…' : result}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
